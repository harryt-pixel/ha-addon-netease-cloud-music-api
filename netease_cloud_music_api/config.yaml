name: NetEase Cloud Music API
version: 1.0.0
slug: netease_cloud_music_api
description: 网易云音乐 API 服务，基于 moefurina/ncm-api 预构建镜像
url: https://github.com/harryt-pixel/ha-addon-netease-cloud-music-api
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  3000/tcp: 3003
ports_description:
  3000/tcp: NetEase Cloud Music API HTTP service
options:
  port: 3003
  enable_flac: true
  cors_allow_origin: "*"
  enable_proxy: false
  proxy_url: ""
  enable_general_unblock: true
  select_max_br: false
  unblock_source: "pyncmd,qq,bodian,migu,kugou,kuwo"
schema:
  port: int(1025,65535)
  enable_flac: bool
  cors_allow_origin: str?
  enable_proxy: bool?
  proxy_url: str?
  enable_general_unblock: bool?
  select_max_br: bool?
  unblock_source: str?
