name: NetEase Cloud Music API
version: 1.0.0
slug: netease_cloud_music_api
description: 网易云音乐 API 服务，基于 moefurina/ncm-api 预构建镜像
url: https://github.com/harryt-pixel/ha-addon-netease-cloud-music-api
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: NetEase Cloud Music API HTTP service
options:
  port: 3000
  enable_flac: true
  cors_allow_origin: "*"
schema:
  port:
    type: int
    default: 3000
  enable_flac:
    type: bool
    default: true
  cors_allow_origin:
    type: str
    default: "*"
    optional: true
  enable_proxy:
    type: bool
    default: false
    optional: true
  proxy_url:
    type: str
    default: ""
    optional: true
  enable_general_unblock:
    type: bool
    default: true
    optional: true
  select_max_br:
    type: bool
    default: false
    optional: true
  unblock_source:
    type: str
    default: "pyncmd,qq,bodian,migu,kugou,kuwo"
    optional: true
